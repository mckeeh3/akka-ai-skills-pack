<svg width="1450" height="1086" viewBox="0 0 1450 1086" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1450" y2="1086"><stop stop-color="#070B13"/><stop offset="1" stop-color="#0D1420"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#161D2B"/><stop offset="1" stop-color="#0D131E"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7AA2FF"/><stop offset="1" stop-color="#5F6CFF"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#4F46E5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".38"/></filter>
    <style>
      .text{font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill:#F8FAFC}.muted{fill:#9AA6B8}.card{fill:url(#panel);stroke:#25314A}.field{fill:#0C1320;stroke:#2A3752}.small{font-size:12px}.body{font-size:14px}.h1{font-size:30px;font-weight:700}.h2{font-size:17px;font-weight:700}.nav{font-size:15px;font-weight:600}.label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;fill:#7F8AA0}.pill{font-size:12px;font-weight:700}.btn{font-size:13px;font-weight:700}.mono{font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    </style>
  </defs>
  <rect width="1450" height="1086" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="206" height="1086" fill="#090E17" stroke="#20283A"/>
  <circle cx="40" cy="49" r="13" stroke="#5380FF" stroke-width="3"/><circle cx="40" cy="49" r="6" fill="#315DFF"/><text x="65" y="55" class="text" font-size="22" font-weight="700">Atlas Ops</text>
  <text x="62" y="128" class="text nav muted">Briefing</text><text x="31" y="129" class="text" font-size="22">⌂</text>
  <g transform="translate(14 156)"><rect width="180" height="44" rx="7" fill="url(#blue)" opacity=".22" stroke="#4C73D9"/><text x="48" y="28" class="text nav">Users</text><text x="18" y="29" class="text" font-size="21">👥</text></g>
  <text x="62" y="238" class="text nav muted">Invitations</text><text x="31" y="238" class="text" font-size="18">✉</text>
  <text x="62" y="294" class="text nav muted">Roles</text><text x="31" y="294" class="text" font-size="18">◇</text>
  <text x="62" y="350" class="text nav muted">Access Review</text><text x="31" y="350" class="text" font-size="18">✓</text>
  <text x="62" y="406" class="text nav muted">Support Access</text><text x="31" y="406" class="text" font-size="18">🛡</text>
  <text x="62" y="462" class="text nav muted">Policies</text><text x="31" y="462" class="text" font-size="18">⚙</text>
  <text x="62" y="518" class="text nav muted">Admin Audit</text><text x="31" y="518" class="text" font-size="18">▤</text>
  <circle cx="48" cy="970" r="25" fill="#27447F"/><text x="34" y="978" class="text" font-size="16" font-weight="700">HM</text><circle cx="66" cy="988" r="5" fill="#6EE784"/><text x="84" y="967" class="text" font-size="14" font-weight="700">Hugh Morris</text><text x="84" y="986" class="muted text small">SaaS Owner Admin</text>

  <g transform="translate(228 34)">
    <text x="0" y="24" class="text h1">Create / Edit User</text>
    <text x="0" y="51" class="text muted body">Invite a user, edit profile and memberships, assign scoped roles, and record an auditable authorization change.</text>
    <rect x="0" y="80" width="780" height="948" rx="16" class="card" filter="url(#shadow)"/>
    <text x="28" y="120" class="text h2">Account and profile</text><text x="28" y="145" class="text muted small">Authentication is handled by WorkOS/AuthKit; local authorization state remains Akka-owned.</text>
    <text x="28" y="183" class="text label">Email</text><rect x="28" y="194" width="340" height="46" rx="10" class="field"/><text x="46" y="222" class="text body">amina@acmelegal.example</text>
    <text x="392" y="183" class="text label">Display name</text><rect x="392" y="194" width="340" height="46" rx="10" class="field"/><text x="410" y="222" class="text body">Amina Patel</text>
    <text x="28" y="273" class="text label">Account status</text><rect x="28" y="284" width="218" height="44" rx="10" class="field"/><text x="46" y="312" class="text body">Active, limited profile</text>
    <text x="270" y="273" class="text label">Default context</text><rect x="270" y="284" width="462" height="44" rx="10" class="field"/><text x="288" y="312" class="text body">Acme Legal · Customer</text>
    <line x1="28" x2="732" y1="362" y2="362" stroke="#27334B"/>

    <text x="28" y="404" class="text h2">Memberships and scoped roles</text><text x="28" y="429" class="text muted small">Every command and query must use selected AuthContext; frontend state is not authorization.</text>
    <g transform="translate(28 458)">
      <rect width="704" height="118" rx="13" fill="#101826" stroke="#2A3752"/>
      <text x="18" y="33" class="text" font-size="16" font-weight="700">Acme Legal</text><text x="18" y="57" class="text muted body">Customer boundary · customerId: cus_acme_legal</text>
      <rect x="18" y="75" width="104" height="26" rx="13" fill="#211A39" stroke="#6D55B8"/><text x="39" y="93" class="text pill">Approver</text>
      <rect x="132" y="75" width="164" height="26" rx="13" fill="#182843" stroke="#446AA8"/><text x="151" y="93" class="text pill">Decision reviewer</text>
      <rect x="508" y="28" width="78" height="32" rx="9" fill="#151D2B" stroke="#35425D"/><text x="528" y="49" class="text btn">Edit</text>
      <rect x="598" y="28" width="82" height="32" rx="9" fill="#2C1518" stroke="#7A333B"/><text x="615" y="49" class="text btn">Remove</text>
    </g>
    <g transform="translate(28 590)">
      <rect width="704" height="86" rx="13" fill="#0E1522" stroke="#2A3752" stroke-dasharray="4 4"/>
      <text x="18" y="35" class="text" font-size="15" font-weight="700">Add membership</text><text x="18" y="60" class="text muted body">Choose tenant/customer scope, role, status, and invitation behavior.</text><rect x="562" y="25" width="118" height="38" rx="10" fill="url(#blue)"/><text x="590" y="49" class="text btn">Add scope</text>
    </g>

    <line x1="28" x2="732" y1="712" y2="712" stroke="#27334B"/>
    <text x="28" y="754" class="text h2">Permission preview</text><text x="28" y="779" class="text muted small">Browser-safe capabilities returned by /api/me for this selected context.</text>
    <rect x="28" y="804" width="704" height="88" rx="13" fill="#101826" stroke="#2A3752"/>
    <rect x="46" y="826" width="146" height="26" rx="13" fill="#123622" stroke="#2D7C4B"/><text x="64" y="844" class="text pill">decision.approve</text>
    <rect x="204" y="826" width="136" height="26" rx="13" fill="#182843" stroke="#446AA8"/><text x="223" y="844" class="text pill">customer.read</text>
    <rect x="352" y="826" width="138" height="26" rx="13" fill="#211A39" stroke="#6D55B8"/><text x="370" y="844" class="text pill">evidence.read</text>
    <text x="46" y="875" class="text muted small">Denied by current role: user.manage, policy.commit, billing.export, support.impersonate</text>

    <text x="28" y="936" class="text h2">Change reason</text><rect x="28" y="956" width="704" height="48" rx="10" class="field"/><text x="46" y="985" class="text body">Grant customer approver access for Q2 renewal review queue.</text>
  </g>

  <g transform="translate(1032 114)">
    <rect width="388" height="288" rx="16" class="card" filter="url(#shadow)"/>
    <text x="22" y="36" class="text h2">Guarded save</text><text x="22" y="62" class="text muted small">Risk and policy checks before authorization changes commit.</text>
    <text x="22" y="104" class="text" fill="#74E58E" font-size="13">✓ Active admin membership verified</text>
    <text x="22" y="138" class="text" fill="#74E58E" font-size="13">✓ Tenant/customer scope matches selected context</text>
    <text x="22" y="172" class="text" fill="#EAB64D" font-size="13">● Adds approval authority; audit reason required</text>
    <text x="22" y="206" class="text" fill="#E66C6C" font-size="13">× Cannot grant policy.commit from this role</text>
    <rect x="22" y="234" width="158" height="38" rx="10" fill="#151D2B" stroke="#35425D"/><text x="62" y="258" class="text btn">Cancel</text>
    <rect x="194" y="234" width="172" height="38" rx="10" fill="url(#blue)"/><text x="238" y="258" class="text btn">Save changes</text>
  </g>

  <g transform="translate(1032 426)">
    <rect width="388" height="250" rx="16" class="card"/>
    <text x="22" y="36" class="text h2">Invitation lifecycle</text><text x="22" y="62" class="text muted small">Required onboarding state for pending or new users.</text>
    <text x="22" y="101" class="text body">Status</text><text x="184" y="101" class="text" fill="#EAB64D" font-size="14">Accepted yesterday</text>
    <text x="22" y="136" class="text body">Token context</text><text x="184" y="136" class="text muted mono">inv_7RA2…</text>
    <text x="22" y="171" class="text body">Delivery</text><text x="184" y="171" class="text" fill="#74E58E" font-size="14">Delivered · captured outbox</text>
    <rect x="22" y="198" width="158" height="34" rx="9" fill="#151D2B" stroke="#35425D"/><text x="60" y="220" class="text btn">Resend</text>
    <rect x="194" y="198" width="172" height="34" rx="9" fill="#2C1518" stroke="#7A333B"/><text x="242" y="220" class="text btn">Revoke</text>
  </g>

  <g transform="translate(1032 700)">
    <rect width="388" height="328" rx="16" class="card"/>
    <text x="22" y="36" class="text h2">Audit preview</text><text x="22" y="62" class="text muted small">Durable AdminAuditEvent created on save or denial.</text>
    <rect x="22" y="86" width="344" height="142" rx="12" fill="#0C1320" stroke="#2A3752"/>
    <text x="42" y="116" class="text mono muted">eventType: USER_MEMBERSHIP_UPDATED</text>
    <text x="42" y="142" class="text mono muted">actor: Hugh Morris</text>
    <text x="42" y="168" class="text mono muted">subject: Amina Patel</text>
    <text x="42" y="194" class="text mono muted">scope: Acme Legal / customer</text>
    <text x="42" y="220" class="text mono muted">correlationId: adm_93Q...</text>
    <text x="22" y="262" class="text" fill="#8DB1FF" font-size="13">Open related access review trace ›</text>
    <text x="22" y="296" class="text" fill="#8DB1FF" font-size="13">Ask AdminRiskAgent to summarize risk ›</text>
  </g>
</svg>
