name: Validate and build pack

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check manifest and README version consistency
        run: bash tools/check-version-consistency.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build versioned pack assets
        run: bash tools/build-pack.sh --clean --github-repo "${{ github.repository }}"

      - name: Upload pack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akka-ai-pack-dist
          path: |
            dist/*.tar.gz
            dist/install-*.sh
          if-no-files-found: error
