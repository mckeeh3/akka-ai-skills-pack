schemaVersion: akka.ai.pack.schema/v1alpha1
kind: ResourcePackManifestSchema
name: akka-ai-skills-pack-manifest

description: >-
  Schema for the Akka AI skills library manifest. The manifest describes the
  harness skills-library install contract, installed pack reference files, and
  external Akka SDK docs that are intentionally not installed into `.agents/skills`.

fields:
  apiVersion:
    type: string
    required: true
    example: akka.ai.pack/v1alpha1

  kind:
    type: string
    required: true
    example: ResourcePack

  metadata:
    type: map
    required: true
    fields:
      name:
        type: string
        required: true
        example: akka-ai-skills-pack
      version:
        type: string
        required: true
        example: 0.3.0
      sourceRepo:
        type: string
        required: true
        example: https://github.com/mckeeh3/akka-ai-skills-pack
      description:
        type: string
        required: true
      compatibleAkkaSdk:
        type: string
        required: true
        example: '3.5.x'

  install:
    type: map
    required: true
    fields:
      unit:
        type: string
        required: true
        example: repository-tag
      installer:
        type: string
        required: true
        example: install-skills.sh
      ownershipManifest:
        type: string
        required: true
        example: .akka-ai-skills-pack-install-manifest
      modes:
        type: map
        required: true
        fields:
          project:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: '{projectRoot}/.agents/skills'
          global:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: ~/.agents/skills
          explicit:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: '<target-skills-dir>'
      options:
        type: map
        required: false
        note: copy, symlink, prune, uninstall, and check options for skills-library installs.

  content:
    type: map
    required: true
    fields:
      skills:
        type: list
        required: true
        itemType: map
        itemFields:
          id:
            type: string
            required: true
          path:
            type: string
            required: true
          category:
            type: string
            required: true
          component:
            type: string
            required: false
          dependsOn:
            type: list
            required: false
            itemType: string
      references:
        type: list
        required: false
        itemType: string
        note: Pack reference files installed under the target skills directory when present, except akka-context which remains external.
      examples:
        type: map
        required: false
        note: Optional metadata for examples installed under `.agents/skills/examples` when present.
      frontendExamples:
        type: map
        required: false
        note: Optional metadata for frontend references. Root application frontend source is not installed into `.agents`.

  bundles:
    type: list
    required: true
    itemType: map
    itemFields:
      id:
        type: string
        required: true
      description:
        type: string
        required: true
      skills:
        type: list
        required: true
        itemType: string
      includeReferences:
        type: boolean
        required: true
      includeExamples:
        type: boolean
        required: true
        note: Bundle metadata only; install-skills.sh installs referenced pack examples when present.

  transforms:
    type: map
    required: true
    fields:
      rewriteExamplePaths:
        type: boolean
        required: true
        note: Must remain false; source paths should already be authored for installed layout.
      rewriteAkkaContextReferences:
        type: boolean
        required: true
        note: Must remain false; akka-context references should target the top-level project/repository directory.
      akkaContextRewriteMessage:
        type: string
        required: false

  externalDocs:
    type: map
    required: true
    fields:
      bundled:
        type: boolean
        required: true
        example: false
      note:
        type: string
        required: true
      sourcePath:
        type: string
        required: false
        example: akka-context

validationRules:
  - metadata.name must be stable across releases
  - content.skills ids must match skills/*/SKILL.md directories
  - bundles[].includeExamples is metadata only; install-skills.sh installs pack examples when present
  - manifests must not define installed application source paths or bundled akka-context paths unless install-skills.sh is intentionally changed in the same release
