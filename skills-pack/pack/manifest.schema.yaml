schemaVersion: akka.ai.pack.schema/v1alpha1
kind: ResourcePackManifestSchema
name: akka-ai-skills-pack-manifest

description: >-
  Schema for the Akka AI skills library manifest. The manifest describes the
  skills-only harness install contract, source-checkout reference files, and
  external/source docs that are intentionally not installed into `.agents`.

fields:
  apiVersion:
    type: string
    required: true
    example: akka.ai.pack/v1alpha1

  kind:
    type: string
    required: true
    example: ResourcePack

  metadata:
    type: map
    required: true
    fields:
      name:
        type: string
        required: true
        example: akka-ai-skills-pack
      version:
        type: string
        required: true
        example: 0.3.0
      sourceRepo:
        type: string
        required: true
        example: https://github.com/mckeeh3/akka-ai-skills-pack
      description:
        type: string
        required: true
      compatibleAkkaSdk:
        type: string
        required: true
        example: '3.5.x'

  install:
    type: map
    required: true
    fields:
      unit:
        type: string
        required: true
        example: repository-tag
      installer:
        type: string
        required: true
        example: install-skills.sh
      ownershipManifest:
        type: string
        required: true
        example: .akka-ai-skills-pack-install-manifest
      modes:
        type: map
        required: true
        fields:
          project:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: '{projectRoot}/.agents/skills'
          global:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: ~/.agents/skills
          explicit:
            type: map
            required: true
            fields:
              skillsDir:
                type: string
                required: true
                example: '<target-skills-dir>'
      options:
        type: map
        required: false
        note: copy, symlink, prune, uninstall, and check options for skills-only installs.

  content:
    type: map
    required: true
    fields:
      skills:
        type: list
        required: true
        itemType: map
        itemFields:
          id:
            type: string
            required: true
          path:
            type: string
            required: true
          category:
            type: string
            required: true
          component:
            type: string
            required: false
          dependsOn:
            type: list
            required: false
            itemType: string
      references:
        type: list
        required: false
        itemType: string
        note: Source-checkout reference files. Only skills/references/** is copied by install-skills.sh.
      examples:
        type: map
        required: false
        note: Deprecated; examples are source-checkout assets and are not installed into `.agents`.
      frontendExamples:
        type: map
        required: false
        note: Deprecated; frontend references are source-checkout assets and are not installed into `.agents`.

  bundles:
    type: list
    required: true
    itemType: map
    itemFields:
      id:
        type: string
        required: true
      description:
        type: string
        required: true
      skills:
        type: list
        required: true
        itemType: string
      includeReferences:
        type: boolean
        required: true
      includeExamples:
        type: boolean
        required: true
        note: Must be false for the current skills-only install contract.

  transforms:
    type: map
    required: true
    fields:
      rewriteExamplePaths:
        type: boolean
        required: true
        note: Must be false for the current skills-only install contract.
      rewriteAkkaContextReferences:
        type: boolean
        required: true
        note: Must be false for the current skills-only install contract.
      akkaContextRewriteMessage:
        type: string
        required: false

  externalDocs:
    type: map
    required: true
    fields:
      bundled:
        type: boolean
        required: true
        example: false
      note:
        type: string
        required: true
      sourcePath:
        type: string
        required: false
        example: akka-context

validationRules:
  - metadata.name must be stable across releases
  - content.skills ids must match skills/*/SKILL.md directories
  - bundles[].includeExamples must be false while install-skills.sh remains skills-only
  - manifests must not define installed docs, templates, examples, frontend examples, or application source paths unless install-skills.sh is intentionally changed in the same release
