syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.api.grpc";

package com.example.api.grpc;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

message CartItem {
  string product_id = 1;
  string name = 2;
  int32 quantity = 3;
}

message Cart {
  string cart_id = 1;
  repeated CartItem items = 2;
  bool checked_out = 3;
  google.protobuf.Timestamp observed_at = 4;
  google.protobuf.StringValue state_label = 5;
  reserved 6;
  reserved "legacy_status_text";
}

message GetCartRequest {
  string cart_id = 1;
}

message AddItemRequest {
  string cart_id = 1;
  string product_id = 2;
  string name = 3;
  int32 quantity = 4;
}

message CheckoutCartRequest {
  string cart_id = 1;
}

message DeleteCartRequest {
  string cart_id = 1;
}

message CartStatusResponse {
  string status = 1;
  google.protobuf.StringValue detail = 2;
}

message CheckedOutCartsRequest {
  bool checked_out = 1;
}

message CartSummary {
  string cart_id = 1;
  int32 item_count = 2;
  bool checked_out = 3;
  google.protobuf.Timestamp observed_at = 4;
  string first_product_id = 5 [deprecated = true];
}

service ShoppingCartGrpcEndpoint {
  rpc GetCart(GetCartRequest) returns (Cart) {}
  rpc AddItem(AddItemRequest) returns (Cart) {}
  rpc CheckoutCart(CheckoutCartRequest) returns (Cart) {}
  rpc DeleteCart(DeleteCartRequest) returns (CartStatusResponse) {}
  rpc StreamCheckedOutCarts(CheckedOutCartsRequest) returns (stream CartSummary) {}
}
