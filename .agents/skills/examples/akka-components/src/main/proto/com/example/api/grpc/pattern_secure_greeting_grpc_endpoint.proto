syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.example.api.grpc";

package com.example.api.grpc;

import "google/protobuf/empty.proto";

message PatternValidatedCallerResponse {
  string issuer = 1;
  string subject = 2;
  string role = 3;
  string name = 4;
  string greeting = 5;
}

service PatternSecureGreetingGrpcEndpoint {
  rpc ValidateCaller(google.protobuf.Empty) returns (PatternValidatedCallerResponse) {}
}
