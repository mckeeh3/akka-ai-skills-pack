# AI-first SaaS starter backend configuration.
#
# Provider-specific local values are supplied through environment variables.
# Start from the scaffolded project root:
#   cp .env.example .env
#   set -a
#   source .env
#   set +a
#
# Common variables documented by the scaffold:
# - WORKOS_API_KEY, WORKOS_API_BASE_URL, WORKOS_JWT_ISSUER, WORKOS_JWT_AUDIENCE
# - ADMIN_USERS
# - RESEND_API_KEY, RESEND_FROM_EMAIL, INVITE_EMAIL_FROM, INVITE_EMAIL_SUBJECT, RESEND_API_BASE_URL
# - APP_PUBLIC_BASE_URL
# - OPENAI_API_KEY for future model-backed agent extensions
#
# The current starter tests use deterministic in-memory adapters and do not require
# real provider secrets. Production readiness must wire durable storage and real
# provider configuration before external sign-in/email/model use.
