akka.javasdk {
  event-sourced-entity.snapshot-every = 100

  agent {
    model-provider = openai

    openai {
      model-name = "gpt-4o-mini"
      api-key = ${?OPENAI_API_KEY}
    }

    guardrails {
      "competitor mention guard" {
        class = "com.example.application.CompetitorMentionGuard"
        agents = ["activity-agent"]
        category = FORMAT
        use-for = ["model-response"]
        report-only = true
        blocked-phrase = "CompetitorCo"
      }
    }
  }
}
