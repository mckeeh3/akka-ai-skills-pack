# AI-first SaaS core app backend configuration.
#
akka.javasdk {
  agent {
    model-provider = openai-low-temperature

    openai-low-temperature {
      provider = "openai"
      model-name = "gpt-4o-mini"
      model-name = ${?OPENAI_MODEL_ID}
      api-key = ""
      api-key = ${?OPENAI_API_KEY}
      base-url = "https://api.openai.com/v1"
      base-url = ${?OPENAI_API_BASE_URL}
      # Keep sampling parameters at OpenAI defaults. Some supported OpenAI models
      # reject non-default temperature values; the Akka provider requires these
      # keys, so use default-compatible values instead of a low-temperature
      # override while preserving real provider fail-closed behavior.
      temperature = 1.0
      top-p = 1.0
      max-tokens = -1
      max-completion-tokens = -1
      connection-timeout = 15s
      response-timeout = 1m
      max-retries = 2
      thinking = false
      additional-model-request-headers = []
    }
  }
}

# Provider-specific local values are supplied through environment variables.
# Start from the project root:
#   cp .env.example .env
#   set -a
#   source .env
#   set +a
#
# Common environment variables:
# - WORKOS_API_KEY, WORKOS_API_BASE_URL, WORKOS_JWT_ISSUER, WORKOS_JWT_AUDIENCE
# - ADMIN_USERS as an explicit SaaS Owner first-admin allowlist: email:SAAS_OWNER_ADMIN:OWNER[,owner2@example.com:SAAS_OWNER_ADMIN:OWNER]
# - RESEND_API_KEY, RESEND_FROM_EMAIL, INVITE_EMAIL_FROM, INVITE_EMAIL_SUBJECT, RESEND_API_BASE_URL
# - APP_PUBLIC_BASE_URL
# - OPENAI_API_KEY, OPENAI_MODEL_ID, OPENAI_API_BASE_URL, OPENAI_REQUEST_TIMEOUT_SECONDS
#
# OPENAI_API_KEY is backend-only. ModelProviderClient/OpenAiModelProviderClient
# fail closed with an actionable model-provider-config-missing error when model
# invocation is requested without required provider configuration. Provider
# secrets must never be returned through /api/me, workstream surfaces, traces,
# frontend env, static assets, or fixtures.
#
# Local tests use Akka component-backed paths and do not require real provider
# secrets. With no ADMIN_USERS value, test-only harness setup may seed a local
# fixture admin; normal runtime should set ADMIN_USERS to the intended first-admin
# entry such as email:SAAS_OWNER_ADMIN:OWNER, configure WorkOS issuer/audience/client id,
# and rely on local membership state; unknown sign-ins are denied, not self-registered.
# Akka components are locally runnable and testable without external databases or brokers.
# Production external sign-in/email/model use still requires the corresponding provider configuration.
