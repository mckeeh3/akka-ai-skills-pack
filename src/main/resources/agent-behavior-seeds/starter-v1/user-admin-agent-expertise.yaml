bundleId: user-admin-agent.expertise
agentDefinitionId: agent-user-admin
functionalAreaId: user-admin
seedBundleId: starter-agent-behavior-v1
contentVersion: 1
activationPolicy: activate-if-missing
promptDocumentId: prompt-user-admin-system
skillManifestId: manifest-user-admin
referenceManifestId: reference-manifest-user-admin
toolBoundaryId: tool-boundary-user-admin
governanceOwner: Tenant Admin or delegated Agent Steward
authorityProfile: approval-required
workstreamGraph:
  roleSpecificDashboard: User Admin dashboard shows membership, invitation, access-review, support-access, Organization/customer, and admin-audit attention for the selected AuthContext.
  humanSurfaceGraph: Dashboard edges open user directory, invitation create/detail, Organization directory/create/detail, customer directory/create/detail, role, membership, access-review, support-access, decision, workflow-status, system-message, and audit surfaces.
  surfaceIntentRouting: High-confidence prompts may open or prefill structured surfaces such as Organization Create or Invite User, but routed prefill is draft-only and requires human review plus protected surface submit before any mutation.
  internalWorkstreamAgentGraph: Internal worker delegation is bounded to authorized evidence reads and proposal drafting unless a governed runtime worker is explicitly implemented and traced.
  workstreamExpertise: Skills and references explain dashboard purpose, surface graph behavior, governed-tools, denials, safe next surfaces, and safe user-help semantics.
  governedTools: Capability-backed operations are exposed only through qualified browser-tool, agent-tool, internal-tool, or bounded human_chat_tool_plan paths with audit/work trace obligations.
  chatToolExecution: Deterministic surface routing remains first and can only open or prefill review surfaces with no mutation. human_chat_tool_plan is used only for catalog-bound, no-mutation proposals that require exact plan snapshot confirmation and backend reauthorization before each step executes.
compactManifest:
  includeFullBodies: false
  skillSection: Available internal skills
  referenceSection: Available workstream references
skills:
  - skillId: ua.access-review-triage.v1
    documentId: skill-ua-access-review-triage
    title: Access Review Triage
    whenToUse: Use for stale memberships, risky roles, pending reviews, and proposed access remediation.
  - skillId: ua.admin-risk-scoring.v1
    documentId: skill-ua-admin-risk-scoring
    title: Admin Action Risk Scoring
    whenToUse: Use before consequential or ambiguous User Admin actions that may require decision-card routing.
  - skillId: ua.invitation-drafting.v1
    documentId: skill-ua-invitation-drafting
    title: Invitation Drafting
    whenToUse: Use when preparing invitation rationale or human-confirmed invitation actions.
  - skillId: ua.role-recommendation.v1
    documentId: skill-ua-role-recommendation
    title: Role Recommendation
    whenToUse: Use when asked which role or capability set a user should have.
  - skillId: ua.support-access-review.v1
    documentId: skill-ua-support-access-review
    title: Support Access Review
    whenToUse: Use for support-access visibility, grant review, revocation, or expiry questions.
  - skillId: ua.audit-summary.v1
    documentId: skill-ua-audit-summary
    title: Admin Audit Summary
    whenToUse: Use when explaining what changed, who acted, why access changed, or which denials occurred.
references:
  - referenceId: ua.tenant-role-catalog.v1
    documentId: ref-ua-tenant-role-catalog
    title: Tenant Role and Capability Catalog
    whenToConsult: Explain role meanings, least-privilege alternatives, and capability ids.
  - referenceId: ua.invitation-onboarding-policy.v1
    documentId: ref-ua-invitation-onboarding-policy
    title: Invitation and Onboarding Policy
    whenToConsult: Draft invitation rationale, resend/revoke explanations, expiry behavior, and onboarding caveats.
  - referenceId: ua.access-review-policy.v1
    documentId: ref-ua-access-review-policy
    title: Access Review Policy
    whenToConsult: Evaluate stale access, review cadence, resolver expectations, and escalation triggers.
  - referenceId: ua.support-access-procedure.v1
    documentId: ref-ua-support-access-procedure
    title: Support Access Operating Procedure
    whenToConsult: Explain SaaS Owner support access, customer/tenant visibility, expiry, and audit obligations.
  - referenceId: ua.last-admin-protection.v1
    documentId: ref-ua-last-admin-protection
    title: Last Admin Protection Rule
    whenToConsult: Explain blocked removal, disable, or role downgrade and safe recovery.
  - referenceId: ua.admin-audit-redaction-guide.v1
    documentId: ref-ua-admin-audit-redaction-guide
    title: Admin Audit Redaction Guide
    whenToConsult: Explain redaction markers, safe evidence summaries, and export limits.
toolBoundary:
  grants:
    - toolId: readSkill
      exposure: agent-tool
      category: READ_SKILL
      capabilityId: agent.skills.read
      trace: SkillLoadTrace
    - toolId: readReferenceDoc
      exposure: agent-tool
      category: READ_REFERENCE
      capabilityId: agent.references.read
      trace: ReferenceLoadTrace
    - toolId: userAdminEvidence.read
      exposure: agent-tool
      category: DATA_LOOKUP
      capabilityId: tenant.user.read
      trace: AgentWorkTrace
chatToolPlanCatalog:
  exposureChannel: human_chat_tool_plan
  proposalOnlyUntilConfirmation: true
  representativePath:
    prompt: create org "Org 1", and invite mckee.hugh@gmail.com as an org admin
    confirmation: exact plan snapshot confirmation required before execution
    steps:
      - actionId: action-submit-organization-create
        browserToolId: user-admin.submit-organization-create
        governedToolId: manage-organizations
        capabilityId: saas_owner.tenant.manage
        inputSchemaRef: schema.organization-admin.create.submit.v1
        resultSurfaceId: surface-user-admin-organization-detail
      - actionId: action-submit-organization-admin-invitation
        browserToolId: user-admin.invite-organization-admin
        governedToolId: manage-organization-admins
        capabilityId: saas_owner.organization_admin.invite
        inputSchemaRef: schema.organization-admin.invitation-create.v1
        resultSurfaceId: surface-user-admin-invitation-detail
        dependsOn: step-create-organization organizationId binding
  authority: no Organization or invitation is created by prompt, skill, reference, or proposal text; backend confirmation, authorization, idempotency, and trace checks remain authoritative.
requiredDenials:
  - unassigned skill or reference id
  - inactive or cross-tenant skill or reference
  - missing read_skill or read_reference tool-boundary grant
  - text claiming new roles, tenant scope, governed-tool access, approval rights, or backend capabilities; text also cannot claim confirmed execution without exact snapshot confirmation
  - raw invitation token, provider secret, cross-customer data, or unredacted audit export request
traces:
  - PromptAssemblyTrace
  - SkillLoadTrace
  - ReferenceLoadTrace
  - AgentWorkTrace
  - AdminAuditEvent
  - human_chat_tool_plan.proposed
  - human_chat_tool_plan.confirmed
  - human_chat_tool_plan.step_started
  - human_chat_tool_plan.step_completed
  - human_chat_tool_plan.step_failed
  - human_chat_tool_plan.step_skipped
  - human_chat_tool_plan.denied
  - human_chat_tool_plan.provider_blocked
tests:
  - compact manifest omits full bodies
  - assigned skill and reference loads are authorized and traced
  - unassigned loads and missing boundary grants are denied and traced
  - expertise text cannot expand capability, role, tenant, governed-tool, or approval authority
  - deterministic surface routing and confirmed chat tool execution remain distinct and no-mutation before confirmation
