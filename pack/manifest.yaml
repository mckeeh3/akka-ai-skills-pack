apiVersion: akka.ai.pack/v1alpha1
kind: ResourcePack

metadata:
  name: akka-ai-pack
  version: 0.1.0
  sourceRepo: https://github.com/hxmc/akka-code-init
  description: >-
    Versioned Akka AI resource pack containing installable skills and Akka SDK Java reference
    examples for entity-focused coding workflows.
  compatibleAkkaSdk: '3.5.x'

install:
  modes:
    project:
      rootDir: '{projectRoot}/.agents'
      skillsDir: '{projectRoot}/.agents/skills'
      manifestsDir: '{projectRoot}/.agents/manifests'
      examplesDir: '{projectRoot}/.agents/resources/examples/java'
    global:
      rootDir: ~/.agents
      skillsDir: ~/.agents/skills
      manifestsDir: ~/.agents/manifests
      examplesDir: ~/.agents/resources/examples/java

content:
  skills:
    - id: akka-entity-type-selection
      path: skills/akka-entity-type-selection
      category: selection
    - id: akka-event-sourced-entities
      path: skills/akka-event-sourced-entities
      category: component-suite
      component: event-sourced-entity
    - id: akka-ese-domain-modeling
      path: skills/akka-ese-domain-modeling
      category: focused
      component: event-sourced-entity
    - id: akka-ese-application-entity
      path: skills/akka-ese-application-entity
      category: focused
      component: event-sourced-entity
    - id: akka-ese-edge-and-flow-patterns
      path: skills/akka-ese-edge-and-flow-patterns
      category: focused
      component: event-sourced-entity
    - id: akka-ese-doc-snippets
      path: skills/akka-ese-doc-snippets
      category: focused
      component: event-sourced-entity
    - id: akka-ese-unit-testing
      path: skills/akka-ese-unit-testing
      category: testing
      component: event-sourced-entity
    - id: akka-ese-integration-testing
      path: skills/akka-ese-integration-testing
      category: testing
      component: event-sourced-entity
    - id: akka-ese-notifications
      path: skills/akka-ese-notifications
      category: feature
      component: event-sourced-entity
    - id: akka-ese-replication
      path: skills/akka-ese-replication
      category: feature
      component: event-sourced-entity
    - id: akka-ese-ttl
      path: skills/akka-ese-ttl
      category: feature
      component: event-sourced-entity
    - id: akka-key-value-entities
      path: skills/akka-key-value-entities
      category: component-suite
      component: key-value-entity
    - id: akka-kve-domain-modeling
      path: skills/akka-kve-domain-modeling
      category: focused
      component: key-value-entity
    - id: akka-kve-application-entity
      path: skills/akka-kve-application-entity
      category: focused
      component: key-value-entity
    - id: akka-kve-edge-and-flow-patterns
      path: skills/akka-kve-edge-and-flow-patterns
      category: focused
      component: key-value-entity
    - id: akka-kve-doc-snippets
      path: skills/akka-kve-doc-snippets
      category: focused
      component: key-value-entity
    - id: akka-kve-unit-testing
      path: skills/akka-kve-unit-testing
      category: testing
      component: key-value-entity
    - id: akka-kve-integration-testing
      path: skills/akka-kve-integration-testing
      category: testing
      component: key-value-entity
    - id: akka-kve-notifications
      path: skills/akka-kve-notifications
      category: feature
      component: key-value-entity
    - id: akka-kve-replication
      path: skills/akka-kve-replication
      category: feature
      component: key-value-entity
    - id: akka-kve-ttl
      path: skills/akka-kve-ttl
      category: feature
      component: key-value-entity
  references:
    - skills/README.md
    - skills/references/akka-entity-comparison.md
  examples:
    exportFrom:
      - pom.xml
      - README.md
      - src/main
      - src/test
    installAs: '{agentsRoot}/resources/examples/java'
    includePom: true
    includeReadme: true

bundles:
  - id: all
    description: Install all currently packaged skills, references, and examples.
    includeReferences: true
    includeExamples: true
    skills:
      - akka-entity-type-selection
      - akka-event-sourced-entities
      - akka-ese-domain-modeling
      - akka-ese-application-entity
      - akka-ese-edge-and-flow-patterns
      - akka-ese-doc-snippets
      - akka-ese-unit-testing
      - akka-ese-integration-testing
      - akka-ese-notifications
      - akka-ese-replication
      - akka-ese-ttl
      - akka-key-value-entities
      - akka-kve-domain-modeling
      - akka-kve-application-entity
      - akka-kve-edge-and-flow-patterns
      - akka-kve-doc-snippets
      - akka-kve-unit-testing
      - akka-kve-integration-testing
      - akka-kve-notifications
      - akka-kve-replication
      - akka-kve-ttl
  - id: entities-core
    description: Install the full entity-oriented skill suite for event sourced and key value entities.
    includeReferences: true
    includeExamples: true
    skills:
      - akka-entity-type-selection
      - akka-event-sourced-entities
      - akka-ese-domain-modeling
      - akka-ese-application-entity
      - akka-ese-edge-and-flow-patterns
      - akka-ese-doc-snippets
      - akka-ese-unit-testing
      - akka-ese-integration-testing
      - akka-ese-notifications
      - akka-ese-replication
      - akka-ese-ttl
      - akka-key-value-entities
      - akka-kve-domain-modeling
      - akka-kve-application-entity
      - akka-kve-edge-and-flow-patterns
      - akka-kve-doc-snippets
      - akka-kve-unit-testing
      - akka-kve-integration-testing
      - akka-kve-notifications
      - akka-kve-replication
      - akka-kve-ttl
  - id: ese-core
    description: Install only event sourced entity skills plus shared references and examples.
    includeReferences: true
    includeExamples: true
    skills:
      - akka-entity-type-selection
      - akka-event-sourced-entities
      - akka-ese-domain-modeling
      - akka-ese-application-entity
      - akka-ese-edge-and-flow-patterns
      - akka-ese-doc-snippets
      - akka-ese-unit-testing
      - akka-ese-integration-testing
      - akka-ese-notifications
      - akka-ese-replication
      - akka-ese-ttl
  - id: kve-core
    description: Install only key value entity skills plus shared references and examples.
    includeReferences: true
    includeExamples: true
    skills:
      - akka-entity-type-selection
      - akka-key-value-entities
      - akka-kve-domain-modeling
      - akka-kve-application-entity
      - akka-kve-edge-and-flow-patterns
      - akka-kve-doc-snippets
      - akka-kve-unit-testing
      - akka-kve-integration-testing
      - akka-kve-notifications
      - akka-kve-replication
      - akka-kve-ttl

transforms:
  rewriteExamplePaths: true
  rewriteAkkaContextReferences: true
  examplePathRules:
    - from: ../../../src/
      to: ../../resources/examples/java/src/
  akkaContextRewriteMessage: Official Akka SDK docs for this topic (not bundled with this pack)

externalDocs:
  bundled: false
  note: >-
    akka-context is intentionally excluded from installation. It is included in this repository only
    as a maintainer/reference source.
  sourcePath: akka-context
