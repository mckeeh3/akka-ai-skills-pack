apiVersion: akka.ai.pack/v1alpha1
kind: ResourcePack

metadata:
  name: akka-ai-skills-pack
  version: 0.1.0
  sourceRepo: https://github.com/mckeeh3/akka-ai-skills-pack
  description: >-
    Versioned Akka AI resource pack containing installable skills for intent-driven Akka
    application design, decomposition, and code generation, plus Akka SDK Java reference
    examples.
  compatibleAkkaSdk: '3.5.x'

install:
  modes:
    project:
      rootDir: '{projectRoot}/.agents'
      skillsDir: '{projectRoot}/.agents/skills'
      manifestsDir: '{projectRoot}/.agents/manifests'
      examplesDir: '{projectRoot}/.agents/resources/examples/java'
    global:
      rootDir: ~/.agents
      skillsDir: ~/.agents/skills
      manifestsDir: ~/.agents/manifests
      examplesDir: ~/.agents/resources/examples/java

